<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial - Dialex</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Acceso Privado</h2>
            <input type="password" id="passInput" placeholder="Contraseña">
            <button onclick="verificarPassword()">Ingresar</button>
        </div>
    </div>

    <div id="appContainer">
        <aside class="sidebar">
            <div class="sidebar-header"><h3>SISTEMA DE ANÁLISIS</h3></div>
            <ul class="modulos-list" id="listaModulos">
                <li onclick="cambiarModulo('productividad', this)">PRODUCTIVIDAD VENDEDORES</li>
                <li class="active" onclick="cambiarModulo('general', this)">VISTA GENERAL</li>
                <li onclick="cambiarModulo('situacion', this)">SITUACIÓN CLIENTES</li>
                <li onclick="cambiarModulo('busqueda', this)">BÚSQUEDA</li>
            </ul>
        </aside>

        <main class="main-content">
            <div id="selectorVendedorMobile" style="display: none; padding: 15px;">
                <select id="vendedorDropdown" onchange="cargarDataVendedorPorDropdown(this.value)" style="width: 100%; padding: 12px; border-radius: 8px;">
                    <option value="">Selecciona un Vendedor...</option>
                </select>
            </div>

            <h1 class="header-title" id="tituloDashboard">Vista General</h1>
            
            <div id="vistaGeneral" class="modulo-view">
                <div class="kpi-resumen" id="kpiGeneral"></div>
                <div class="dashboard-grid">
                    <div class="card"><h3 class="card-title">Avance Meta</h3><div class="chart-container"><canvas id="chartVelocimetroGeneral"></canvas><div class="speed-text" id="textoVelocimetroGeneral">0%</div></div></div>
                    <div class="card"><h3 class="card-title">Canales</h3><div class="chart-container"><canvas id="chartDonaGeneral"></canvas></div></div>
                    <div class="card full-width"><h3 class="card-title">Ventas x Días</h3><div class="chart-container"><canvas id="chartLineaGeneral"></canvas></div></div>
                    <div class="card full-width"><h3 class="card-title">Ranking Metas</h3><div class="chart-container"><canvas id="chartRankingMeta"></canvas></div></div>
                </div>
            </div>

            <div id="vistaProductividad" class="modulo-view" style="display: none;">
                <div class="kpi-resumen" id="kpiVendedor"></div>
                <div class="dashboard-grid">
                    <div class="card"><h3 class="card-title">Avance Meta</h3><div class="chart-container"><canvas id="chartVelocimetroVendedor"></canvas><div class="speed-text" id="textoVelocimetroVendedor">0%</div></div></div>
                    <div class="card"><h3 class="card-title">Logrado vs Faltante</h3><div class="chart-container"><canvas id="chartDonaVendedor"></canvas></div></div>
                    <div class="card"><h3 class="card-title">Top Productos</h3><div class="table-wrapper"><table id="tablaProdUnid"><thead><tr><th>Prod</th><th>Unid</th></tr></thead><tbody></tbody></table></div></div>
                    <div class="card full-width"><h3 class="card-title">Mapa Ruta</h3><div id="ContenedorMapaVendedor" class="mapa-contenedor"></div></div>
                </div>
            </div>

            <div id="vistaBusqueda" class="modulo-view" style="display: none;">
                <input type="text" id="inputBusqueda" placeholder="Buscar cliente..." onkeyup="filtrarDirectorio()" style="width:100%; padding:15px; margin-bottom:20px; border-radius:8px;">
                <div class="split-layout">
                    <div class="card split-left"><div class="table-wrapper"><table id="tablaDir"><thead><tr><th>Doc</th><th>Razon</th></tr></thead><tbody></tbody></table></div></div>
                    <div class="card split-right" id="panelDetalle" style="display:none;"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
